<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ movie.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand h1">Catálogo de Películas</span>
    </nav>

    <div class="container mt-4">
        <a href="{% url 'movies:index' %}" class="btn btn-secondary mb-3">← Volver al listado</a>

        <div class="card">
            <div class="card-body">
                <h2 class="card-title">{{ movie.title }}</h2>
                <hr>
                <p><strong>Año de publicación:</strong> {{ movie.publication_year }}</p>
                <p><strong>Director:</strong> {{ movie.director_name }}</p>
                <p><strong>Género:</strong> {{ movie.genre }}</p>
                <p><strong>Sinopsis:</strong> {{ movie.synopsis }}</p>
            </div>
        </div>
    </div>

</body>
</html>
