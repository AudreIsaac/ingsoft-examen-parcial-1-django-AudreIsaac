<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Películas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand h1">Catálogo de Películas</span>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-3">Películas</h2>

        {% if movies %}
            <ul class="list-group">
                {% for movie in movies %}
                    <li class="list-group-item list-group-item-action">
                        <a href="{% url 'movies:detail' movie.pk %}" class="text-decoration-none text-dark">
                            {{ movie.title }} - {{ movie.publication_year }}
                        </a>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="text-muted">No hay películas registradas.</p>
        {% endif %}
    </div>

</body>
</html>
